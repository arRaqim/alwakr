<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدونة | الوكر للتعريبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warning: '#FFCC00',
                        dark: '#060608',
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #060608 !important;
            background-image: linear-gradient(to bottom, rgba(6, 6, 8, 0.88), rgba(6, 6, 8, 0.98)),
                              url('https://arraqim.github.io/alwakr/wallhaven-853z1o.jpg') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='4' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(20, 20, 25, 0.6) 0%, rgba(10, 10, 12, 0.8) 100%);
            border: 1px solid rgba(63, 63, 70, 0.3);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .glass-panel:hover {
            border-color: rgba(255, 204, 0, 0.4);
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.15);
            transform: translateY(-2px);
        }

        ::selection {
            background-color: #FFCC00;
            color: #000;
        }

        .article-thumb {
            background: linear-gradient(135deg, rgba(255,204,0,0.08) 0%, rgba(0,0,0,0.4) 100%);
        }
    </style>
</head>
<body class="min-h-screen text-gray-400 font-sans antialiased relative overflow-x-hidden">

    <div class="grain-overlay"></div>

    <div class="relative z-10 flex flex-col min-h-screen">

        <nav class="sticky top-4 z-50 max-w-4xl mx-auto w-full px-4 sm:px-6 py-3 sm:py-4 glass-panel rounded-2xl flex justify-between items-center transition-all duration-300">
            <a href="https://arraqim.github.io/alwakr/" class="flex items-center gap-2 sm:gap-3 cursor-pointer">
                <img src="https://arraqim.github.io/alwakr/path1-3.svg" alt="شعار الوكر" class="w-8 h-8 sm:w-10 sm:h-10 object-contain drop-shadow-[0_0_8px_rgba(255,204,0,0.5)] transition-transform hover:scale-105">
                <span class="font-black text-lg sm:text-xl text-zinc-100 tracking-wide">الوكر.</span>
            </a>
            <div class="flex items-center gap-4 sm:gap-6 text-xs sm:text-sm font-bold tracking-wide">
                <a href="https://arraqim.github.io/alwakr/blog/" class="text-zinc-300 hover:text-warning transition-all duration-300 hover:scale-105 drop-shadow-md hover:drop-shadow-[0_0_8px_rgba(255,204,0,0.6)]">الإصدارات</a>
                <a href="#about" class="text-zinc-300 hover:text-warning transition-all duration-300 hover:scale-105 drop-shadow-md hover:drop-shadow-[0_0_8px_rgba(255,204,0,0.6)]">من أنتم</a>
            </div>
        </nav>

        <header class="max-w-4xl mx-auto w-full px-6 pt-20 pb-12 text-center sm:text-right">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md glass-panel text-zinc-300 text-[11px] font-bold mb-6">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-warning opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-warning"></span>
                </span>
                <span class="tracking-widest uppercase">سجل التعريب</span>
            </div>

            <h1 class="text-4xl sm:text-6xl font-black text-zinc-100 leading-tight mb-3 drop-shadow-lg">
                المدونة
            </h1>
            <p class="text-base sm:text-lg leading-relaxed text-zinc-400 max-w-2xl sm:mx-0 mx-auto">
                ملاحظات وتدوينات عن الألعاب التي نترجمها.
            </p>
        </header>

        <section id="articles" class="max-w-4xl mx-auto w-full px-6 pb-24 flex-grow">
            <div class="text-zinc-500 text-[13px] font-bold tracking-widest uppercase px-1 mb-6 border-r-2 border-warning pr-2">
                المقالات
            </div>

            <div class="grid gap-5">

                <a href="zero.html" class="glass-panel rounded-xl p-6 flex flex-col sm:flex-row sm:items-center gap-6 group">
                    <div class="article-thumb w-full sm:w-32 h-32 sm:h-20 rounded-lg flex items-center justify-center shrink-0 border border-zinc-800/60 overflow-hidden">
                        <img src="rgg.jpg" alt="عنوان المقال" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-3 mb-2">
                            <h2 class="text-lg sm:text-xl font-bold text-zinc-200 group-hover:text-warning transition-colors">
                                كالتنين: صفر | 龍が如く0
                            </h2>
                            <span class="text-[10px] font-bold text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded border border-emerald-400/30">مكتمل</span>
                        </div>
                        <p class="text-sm leading-relaxed text-zinc-500 mb-3 line-clamp-2">
                           أصحاب الحُسّر.
                        </p>
                        <div class="flex items-center gap-4 text-[11px] text-zinc-600 font-bold tracking-wide">
                            <span>30 يونيو 2026</span>
                        </div>
                    </div>
                </a>

            </div>
        </section>

        <footer class="mt-auto py-8 text-center text-zinc-600 text-[11px] tracking-widest border-t border-zinc-900/60 w-full">
            © 2077 نصف الحقوق محفوظة
            <br>
            <span class="text-zinc-700">فريق تابع للرَّقيم.</span>
        </footer>

    </div>

</body>
</html>
